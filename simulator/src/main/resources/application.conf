caffeine.simulator {
    # The maximum number of entries in the cache
    maximum-size = 512

    dash {
        # numOfSegments * (numOfNormalBuckets + numOfStashBuckets) * bucketSize
        # must equal maximum-size exactly; otherwise the policy throws.
        numOfSegments = 1
        # Probing requires >= 2 (wraparound to next normal bucket).
        numOfNormalBuckets = 2
        numOfStashBuckets = 6
        bucketSize = 64
        # 0 - no debugging, 1 - info level, 2 - debug level
        debugMode = 2
        policy = [classiclru, timestamplru, lifo, lfu, fifo, swap]
        # Combined eviction policies (Strategy 2): only timestamplru and lfu
        combinedPolicy = [timestamplru, lfu]
        # On tie, evict from probing bucket (true) or target bucket (false)
        tieBreakEvictProbing = true
    }

    associativeCache {
        numOfBuckets = [1]
        # 0 - no debugging, 1 - info level, 2 - debug level
        debugMode = 2
        policy = [classiclru, lfu]
    }

    lruRust {
        # 0 - no debugging, 1 - info level, 2 - debug level
        debugMode = 0
    }

    policies = [
        opt.Unbounded,
        opt.Clairvoyant,

        linked.Lru,
        linked.Lfu,
        linked.Fifo,
        sketch.WindowTinyLfu,
        adaptive.Arc,
        two-queue.S3Fifo,

        dash.DashPromotionColdRust,
        dash.DashPromotionHotRust,
        dash.DashCombinedRust,
        associative.AssociativeCacheRust,
        lrurust.LruRust,
    ]

    trace {
        # files: reads from the trace file(s)
        # synthetic: reads from a synthetic generator

        # DON'T CHANGE THIS TO synthetic
        source = files
    }

    files {
        paths = [ multi1.trace.gz ]
        format = lirs
    }

    report {
        sort-by = "Hit Rate"
        ascending = false
    }
}
